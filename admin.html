<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toranam Admin Dashboard</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#8B0000;
    margin-bottom:30px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th{
    background:#8B0000;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f9f9f9;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover{
    background:darkred;
}

</style>

</head>
<body>

<h1>Toranam Events - Admin Dashboard</h1>

<div class="table-container">

<table id="bookingTable">

<thead>
<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Event Type</th>
    <th>Event Date</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>

<script>

loadBookings();

async function loadBookings(){

    try{

        const response =
        await fetch("http://localhost:5000/bookings");

        const data =
        await response.json();

        const tbody =
        document.querySelector("#bookingTable tbody");

        tbody.innerHTML = "";

        data.forEach(booking => {

            tbody.innerHTML += `
            <tr>
                <td>${booking.name}</td>
                <td>${booking.phone}</td>
                <td>${booking.eventType || "Not Selected"}</td>
                <td>${booking.eventDate}</td>
                <td>
                    <button
                    class="delete-btn"
                    onclick="deleteBooking('${booking._id}')">
                    Delete
                    </button>
                </td>
            </tr>
            `;

        });

    }
    catch(error){

        console.log(error);

        alert("Unable to load bookings");

    }

}

async function deleteBooking(id){

    const confirmDelete =
    confirm("Are you sure you want to delete this booking?");

    if(!confirmDelete){
        return;
    }

    try{

        await fetch(
            `http://localhost:5000/bookings/${id}`,
            {
                method:"DELETE"
            }
        );

        loadBookings();

    }
    catch(error){

        console.log(error);

        alert("Delete failed");

    }

}

</script>

</body>
</html>
