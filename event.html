<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Details - Toranam Events</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:50px;
}

.gallery{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.form-container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.form-container h2{
    text-align:center;
    color:#8B0000;
    margin-bottom:20px;
}

.form-container input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.form-container button{
    width:100%;
    padding:12px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.form-container button:hover{
    background:#a50000;
}

#message{
    margin-top:20px;
    text-align:center;
    color:green;
    font-size:18px;
    font-weight:bold;
}

footer{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:50px;
}

footer a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

@media(max-width:768px){
    .header h1{
        font-size:35px;
    }
}
</style>

</head>
<body>

<div class="header">
    <h1 id="eventTitle">Event</h1>
</div>

<div class="gallery" id="gallery"></div>

<div class="form-container">

    <h2>Book This Event</h2>

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="date" id="eventDate">

        <button type="submit">
    Book Now
</button>

    </form>

    <p id="message"></p>

</div>

<footer>

    <h2>Reach Out</h2>

    <p>
        <a href="tel:+916303059600">📞 +91 6303059600</a> |
        <a href="https://instagram.com/toranam.decors" target="_blank">
            📷 toranam.decors
        </a> |
        <a href="mailto:toranamevents@gmail.com">
            ✉️ toranamevents@gmail.com
        </a>
    </p>

</footer>

<script>

const eventName = new URLSearchParams(window.location.search).get("event");

document.getElementById("eventTitle").innerText = eventName;

const gallery = document.getElementById("gallery");

const images = {

Birthday:[
"images/birthday event 1.jpeg",
"images/birthday event 2.jpeg",
"images/birthday event 3.jpeg",
"images/birthday event 4.jpeg"
],

"Baby Shower":[
"images/baby shower 1.jpeg",
"images/baby shower 2.jpeg",
"images/baby shower 3.jpeg",
"images/baby shower 4.jpeg"
],

"Baby Welcome":[
"images/baby welcome 1.jpeg",
"images/baby welcome 2.jpeg",
"images/baby welcome 3.jpeg",
"images/baby welcome 4.jpeg"
],

"Bride To Be":[
"images/bride 1.jpeg",
"images/bride 2.jpeg",
"images/bride 3.jpeg",
"images/bride 4.jpeg"
],

"Surprise Event":[
"images/surprise event 1.jpeg",
"images/surprise event 2.jpeg",
"images/surprise event 3.jpeg",
"images/surprise event 4.jpeg"
],

Wedding:[
"images/wedding 1.jpeg",
"images/wedding 2.jpeg",
"images/wedding 3.jpeg",
"images/wedding 4.jpeg"
],

Haldi:[
"images/haldi 1.jpeg",
"images/haldi 2.jpeg",
"images/haldi 3.jpeg",
"images/haldi 4.jpeg"
]

};

if(images[eventName]){

images[eventName].forEach(image=>{

gallery.innerHTML += `
<img src="${image}" alt="${eventName}">
`;

});

}

document.getElementById("bookingForm")


document.getElementById("eventTitle").innerText = eventName;

async function submitBooking() {

    const bookingData = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        eventType: eventName,
        eventDate: document.getElementById("eventDate").value
    };

    if(
        !bookingData.name ||
        !bookingData.phone ||
        !bookingData.eventDate
    ){
        alert("Please fill all fields");
        return;
    }

    try {

       console.log("Sending Data:", bookingData);

const response = await fetch(
    "http://localhost:5000/book-event",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(bookingData)
    }
);

const data = await response.json();

        if(data.success){

            const whatsappMessage =
`🎉 New Booking Received

Name: ${bookingData.name}
Phone: ${bookingData.phone}
Event: ${bookingData.eventType}
Date: ${bookingData.eventDate}`;

            const whatsappURL =
`https://wa.me/916303059600?text=${encodeURIComponent(whatsappMessage)}`;

            window.open(whatsappURL, "_blank");

            alert("Booking Saved Successfully!");

            document.getElementById("bookingForm").reset();

        } else {

            alert("Booking Failed");

        }

    } catch(error){
    console.error(error);
    alert(error.message);
}
}

document.getElementById("bookingForm")
.addEventListener("submit", function(e){

    e.preventDefault();
    submitBooking();

});

</script>
</body>
</html>
