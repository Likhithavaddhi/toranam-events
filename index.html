<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toranam Events</title>

    <link rel="stylesheet" href="style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#ffffff;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:90%;
            max-width:1200px;
            display:flex;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            border-radius:10px;
            overflow:hidden;
        }

        .left-section{
            flex:1;
            background:url('images/banner.png');
            background-size:cover;
            background-position:center;
            min-height:500px;
        }

        .right-section{
            flex:1;
            background:white;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-box{
            width:80%;
            text-align:center;
        }

        .logo{
            width:150px;
            margin-bottom:20px;
        }

        h1{
            color:#8B0000;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#8B0000;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#a50000;
        }

        @media(max-width:768px){
            .container{
                flex-direction:column;
            }

            .left-section{
                min-height:250px;
            }
        }
    </style>
</head>
<body>

<div class="container">


        <div class="register-box">

            <img src="images/logo.png" alt="Toranam Logo" class="logo">

            <h1>Registration</h1>

            <form id="registerForm">

                <input type="text"
                       id="username"
                       placeholder="Enter Your Name"
                       required>

                <button type="submit">
                    Register
                </button>

            </form>

        </div>

    </div>

</body>

<script>

document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    let username = document.getElementById("username").value;

    localStorage.setItem("username", username);

    window.location.href = "home.html";

});

</script>

</script>

</body>
</html>
